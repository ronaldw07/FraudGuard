# Render Blueprint — deploy via Render dashboard: New -> Blueprint -> select this repo.
# Render auto-provisions the service below from this file.
#
# DATABASE_URL is intentionally left for manual entry (sync: false) rather than
# Render's own free Postgres, since Render's free database plan expires after 30 days.
# Use a permanent free Postgres instead (e.g. https://neon.tech) and paste its
# connection string in during setup.

services:
  - type: web
    name: fraudguard
    runtime: docker
    plan: free
    dockerfilePath: docker/Dockerfile.web
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SEED_DEMO_USER
        value: 'true'
