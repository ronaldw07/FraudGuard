# Author: Ronald Wen
name: CI

on:
  push:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest

      - name: Run backend tests
        run: pytest backend/ -v

  build-docker:
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f docker/Dockerfile.backend -t fraudguard-backend .

      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t fraudguard-frontend .
