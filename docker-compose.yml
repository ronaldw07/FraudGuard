# Author: Ronald Wen
version: '3.9'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: fraudguard
      POSTGRES_PASSWORD: fraudguard
      POSTGRES_DB: fraudguard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fraudguard']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql://fraudguard:fraudguard@postgres:5432/fraudguard
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/model:/app/model

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  postgres_data:
